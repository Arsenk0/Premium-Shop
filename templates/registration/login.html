{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Вхід" %}{% endblock %}

{% block content %}
<div class="container fade-in" style="max-width: 500px; margin-top: 4rem;">
    <div style="background: white; padding: 3rem; border-radius: 20px; box-shadow: var(--shadow);">
        <h1 style="text-align: center; margin-bottom: 2rem;">{% trans "Вхід у кабінет" %}</h1>

        <form method="post" class="premium-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_username">{% trans "Логін або Email" %}</label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label for="id_password">{% trans "Пароль" %}</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">{% trans "Увійти"
                %}</button>
        </form>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                document.querySelectorAll('.toggle-password').forEach(function (el) {
                    el.addEventListener('click', function () {
                        const input = this.parentElement.querySelector('input');
                        if (input.type === 'password') {
                            input.type = 'text';
                            this.innerHTML = '<i class="fas fa-eye-slash"></i>';
                        } else {
                            input.type = 'password';
                            this.innerHTML = '<i class="fas fa-eye"></i>';
                        }
                    });
                });
            });
        </script>

        <div style="text-align: center; margin-top: 2rem; color: #666;">
            {% trans "Немає аккаунту?" %} <a href="{% url 'store:signup' %}"
                style="color: var(--primary); font-weight: 600;">{% trans "Зареєструватися" %}</a>
        </div>
    </div>
</div>
{% endblock %}
