{% load static i18n %}
<nav class="navbar">
    <div class="logo">
        <a href="{% url 'store:product_list' %}">PREMIUM<span>SHOP</span></a>
    </div>
    <div class="nav-links" style="display: flex; align-items: center; gap: 1rem;">
        <a href="{% url 'store:about' %}" class="link-underline">{% trans "Про нас" %}</a>
        <a href="{% url 'store:reviews_page' %}" class="link-underline">{% trans "Відгуки" %}</a>
        <a href="{% url 'store:contact' %}" class="link-underline">{% trans "Контакти" %}</a>
        <form action="{% url 'store:product_search' %}" method="get" class="search-bar">
            <input type="text" name="q" placeholder="{% trans 'Пошук...' %}" value="{{ request.GET.q }}">
            <button type="submit" style="background:none; border:none; cursor:pointer;"><i class="fas fa-search"></i></button>
        </form>
        {% if user.is_authenticated %}
        <a href="{% url 'store:profile' %}" class="nav-auth-link link-underline"><i class="fas fa-user"></i> {% trans "Кабінет" %}</a>
        {% else %}
        <a href="{% url 'login' %}" class="nav-auth-link link-underline">{% trans "Вхід" %}</a>
        <a href="{% url 'store:signup' %}" class="nav-auth-link link-underline">{% trans "Реєстрація" %}</a>
        {% endif %}

        <form action="{% url 'set_language' %}" method="post" style="display:flex; align-items:center; margin-right: 0.5rem;">
            {% csrf_token %}
            <input name="next" type="hidden" value="{{ request.get_full_path }}">
            <select name="language" onchange="this.form.submit()"
                style="padding: 0.3rem; border-radius: 4px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-main); cursor: pointer; font-size: 0.9rem;">
                {% get_current_language as LANGUAGE_CODE %}
                {% get_available_languages as LANGUAGES %}
                {% get_language_info_list for LANGUAGES as languages %}
                {% for language in languages %}
                <option value="{{ language.code }}" {% if language.code == LANGUAGE_CODE %} selected{% endif %}>
                    {% if language.code == 'uk' %}🇺🇦{% elif language.code == 'en' %}🇬🇧{% elif language.code == 'cs' %}🇨🇿{% endif %} 
                    {{ language.code|upper }}
                </option>
                {% endfor %}
            </select>
        </form>

        <form action="{% url 'store:set_currency' %}" method="post" style="display:flex; align-items:center;">
            {% csrf_token %}
            <input name="next" type="hidden" value="{{ request.get_full_path }}">
            <select name="currency" onchange="this.form.submit()"
                style="padding: 0.3rem; border-radius: 4px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-main); cursor: pointer; font-size: 0.9rem; font-weight: 400;">
                <option value="UAH" {% if selected_currency == 'UAH' %}selected{% endif %}>UAH (грн)</option>
                <option value="USD" {% if selected_currency == 'USD' %}selected{% endif %}>USD ($)</option>
                <option value="CZK" {% if selected_currency == 'CZK' %}selected{% endif %}>CZK (Kč)</option>
            </select>
        </form>

        <button id="theme-toggle" class="nav-auth-link" style="background: none; border: none; cursor: pointer; font-size: 1.2rem; margin-right: 0.5rem; color: var(--text-main);" title="Toggle Theme">
            <i class="fas fa-moon"></i>
        </button>

        <a href="{% url 'store:wishlist_list' %}" class="nav-auth-link" title="{% trans 'Список бажань' %}"><i class="fas fa-heart"></i></a>
        <a href="{% url 'store:cart_detail' %}" class="cart-link">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count" class="cart-badge">{{ cart_count }}</span>
        </a>
    </div>
</nav>
