<!DOCTYPE html>
{% load static i18n %}
<html lang="{{ request.LANGUAGE_CODE }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="description"
        content="{% trans 'Premium Shop - найкращий стрітвір та кросівки в Україні. Тільки оригінальна якість та преміальний сервіс.' %}">
    <meta name="keywords" content="{% trans 'кросівки, стрітвір, одяг, Україна, купити кросівки, premium shop' %}">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:title" content="{% block og_title %}{% trans 'Premium Shop - Твій Стиль' %}{% endblock %}">
    <meta property="og:description" content="{% trans 'Найкращий вибір преміального одягу та взуття.' %}">
    <meta property="og:image" content="{% static 'img/og-image.jpg' %}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#000000">
    <meta name="format-detection" content="telephone=no">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body data-authenticated="{{ user.is_authenticated|yesno:'true,false' }}"
    data-toast-added="{% trans 'Додано до кошика!' %}" data-toast-error="{% trans 'Халепа, щось пішло не так!' %}"
    data-toast-select-size="{% trans 'Будь ласка, оберіть розмір!' %}" data-loading="{% trans 'Завантаження...' %}"
    data-select-warehouse="{% trans 'Оберіть відділення' %}" data-no-warehouses="{% trans 'Відділень не знайдено' %}"
    data-toast-wishlist-added="{% trans 'Додано до списку бажань!' %}"
    data-toast-wishlist-removed="{% trans 'Видалено зі списку бажань' %}"
    data-modal-wishlist-title="{% trans 'Бажаєте додати в список бажань? 😉' %}"
    data-modal-wishlist-desc="{% trans 'Увійдіть або зареєструйтесь, щоб ваші улюблені товари завжди були під рукою!' %}"
    data-modal-cart-title="{% trans 'Бажаєте додати в кошик? 😉' %}"
    data-modal-cart-desc="{% trans 'Увійдіть або зареєструйтесь, щоб ваші товари зберігалися в особистому кабінеті та ви отримували бонуси!' %}">
    
    {% include 'includes/navbar.html' %}

    <div id="toast-container"></div>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% include 'includes/footer.html' %}

    {% include 'includes/modals.html' %}

    <script type="module" src="{% static 'js/main.js' %}"></script>
</body>

</html>
