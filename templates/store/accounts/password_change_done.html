{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Пароль змінено" %}{% endblock %}

{% block content %}
<div class="container fade-in premium-dashboard">
    <div class="card premium-card" style="max-width: 500px; margin: 4rem auto; text-align: center; padding: 4rem;">
        <div style="font-size: 4rem; margin-bottom: 2rem;">✅</div>
        <h1 style="margin-bottom: 1rem;">{% trans "Успішно!" %}</h1>
        <p style="color: #666; margin-bottom: 2.5rem;">{% trans "Ваш пароль було успішно змінено. Тепер ви можете використовувати новий пароль для входу." %}</p>
        <a href="{% url 'store:profile' %}" class="btn btn-outline btn-lg hover-scale" style="padding: 1rem 3rem; background-color: #e0e0e0 !important;">{% trans "До кабінету" %}</a>
    </div>
</div>
{% endblock %}
